<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .body{
            text-align: center;
            margin-top: 150px;
            font-size: 20px;
        }
       .gear{
        position: fixed;
        top: 20px;
        left: 20px;
        font-size: 20px;

       }
       .clock{
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 20px;
       }
       .txt{
        color: steelblue;
       }
       .inputbox{
        border-radius: 10px;
        width: 500px;
        padding: 10px;
        text-align: center;
       }
       .lens{
        font-size: 20px;
        position: relative;
        left: 40px;
       }
       .para{
        font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
       }
       .search{
        border-radius: 10px;
        width: 350px;
        margin-right: auto;
        margin-left: auto;
        padding:10px;
        border-radius: 10px;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
       }
       .body{
        background-color: bisque;
       }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body class="body">
<span class="gear">&#9881;</span>
<span class="clock">&#8226; online | &#9202; - ms</span>

<div class="body">
    <h1><span class="txt">BEING</span> INFINITY</h1>
    <p class="para">One million phrases. Four algorithms. Prefix Based Auto Suggest</p>
    <span class="lens">&#x1F50D;</span>
    <INput class="inputbox" type="text" placeholder="start typing to search"></INput>
    <div class="search">
        <!-- <div>Cyber Security</div> -->
    </div>
</div>
<script>
    function getsearchsuggestions(){
        var searchBox=document.getElementById("inputbox");
        var searchSuggestions= document.getElementById("search");
        
        var userInput = searchBox.value;
        if(userInput.trail()=="")return;
        var URL_1="https://autosuggest-backend.onrender.com/api/autosuggest?q=";
        var URL_3="&algorithm=brute&limit=10&weighted=false";
        var URL= URL_1+userInput+URL_3;

        fetch(URL)
            .then(function(response){
               return response.json();
            })
            .then(function(data){
                var searchResults="";
                var suggestions=data.results;
                for(var i=0;i<data.count;i++){
                    searchResults += "<div class="suggestions">" 
                    suggestions[i].text+
                    "</div>";
                }
                searchSuggestions.innerHTML = searchResults;
            }
            
        
    }
</script>

</body>
</html>
